spring.application.name=springone

spring.datasource.url=jdbc:postgresql://localhost:5433/projetodemo2
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8080
server.servlet.context-path=/projetodemo2
spring.mvc.converters.preferred-json-mapper=jackson
spring.http.converters.preferred-json-mapper=jackson
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.default-content-type=application/json